<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishyfy AI</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: linear-gradient(to right, #0f0c29, #302b63, #24243e);
      color: white;
      padding: 2rem;
    }

    h1 {
      font-size: 3rem;
      text-align: center;
      margin-bottom: 1rem;
      background: linear-gradient(to right, #ff00cc, #3333ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 3s ease-in-out infinite alternate;
    }

    @keyframes glow {
      0% { text-shadow: 0 0 10px #ff00cc; }
      100% { text-shadow: 0 0 20px #3333ff; }
    }

    .input-container {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    input[type="url"] {
      flex: 1;
      padding: 1rem;
      border-radius: 10px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    button {
      padding: 1rem 1.5rem;
      background: #7f00ff;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    button:hover {
      transform: scale(1.05);
    }

    .wishlist {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      padding: 1rem;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease-in-out;
    }

    .card:hover {
      transform: scale(1.03);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 1rem;
    }

    .title {
      font-weight: bold;
      font-size: 1.1rem;
    }

    .price {
      color: #00ffcc;
      margin-top: 0.5rem;
    }

    .predict {
      font-size: 0.9rem;
      color: #ffcc00;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <h1><i class="fa-solid fa-wand-magic-sparkles"></i> Wishyfy AI</h1>
  <div class="input-container">
    <input id="urlInput" type="url" placeholder="Paste your product link here...">
    <button onclick="addItem()"><i class="fa-solid fa-plus"></i> Add</button>
  </div>

  <div class="wishlist" id="wishlistContainer">
    <!-- Wishlist items appear here -->
  </div>

  <script>
    function addItem() {
      const url = document.getElementById('urlInput').value;
      if (!url) return;

      const item = {
        title: 'Sample Product',
        price: `₹${Math.floor(Math.random() * 4000) + 1000}`,
        image: 'https://via.placeholder.com/300x300',
        prediction: `${Math.floor(Math.random() * 50 + 30)}% drop chance`,
        url: url
      };

      const container = document.getElementById('wishlistContainer');
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${item.image}" alt="Product">
        <div class="title">${item.title}</div>
        <div class="price">${item.price}</div>
        <div class="predict"><i class="fa-solid fa-bell"></i> ${item.prediction}</div>
        <a href="${item.url}" target="_blank" class="text-xs text-blue-300">View Product</a>
      `;

      container.prepend(card);
      document.getElementById('urlInput').value = '';
    }
  </script>
</body>
</html>
